name: Check Store Credentials

on:
  workflow_dispatch:

jobs:
  check_chrome:
    runs-on: ubuntu-latest
    environment: chrome-store
    permissions:
      contents: read
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify Chrome Web Store credentials
        env:
          EXTENSION_ID: ${{ vars.CHROME_EXTENSION_ID }}
          SERVICE_ACCOUNT_KEY: ${{ secrets.CWS_SERVICE_ACCOUNT_KEY }}
        run: |
          echo "$SERVICE_ACCOUNT_KEY" > /tmp/cws-key.json
          npm exec chrome-webstore-upload-cli@2 -- get \
            --extension-id "$EXTENSION_ID" \
            --service-account-key /tmp/cws-key.json
          rm -f /tmp/cws-key.json
          echo "Chrome credentials valid"

  check_firefox:
    runs-on: ubuntu-latest
    environment: firefox-store
    permissions:
      contents: read
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify Firefox AMO credentials
        env:
          WEB_EXT_API_KEY: ${{ secrets.AMO_API_KEY }}
          WEB_EXT_API_SECRET: ${{ secrets.AMO_API_SECRET }}
        run: |
          echo "Testing AMO API credentials..."
          npm exec web-ext@8 -- --version
          echo "AMO credentials configured (full validation occurs during sign)"
