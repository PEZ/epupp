name: Check Store Credentials

on:
  workflow_dispatch:

jobs:
  check_chrome:
    runs-on: ubuntu-latest
    environment: chrome-store
    permissions:
      contents: read
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify Chrome Web Store credentials
        env:
          EXTENSION_ID: ${{ vars.CHROME_EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
        run: |
          npm exec chrome-webstore-upload-cli@2 -- get \
            --extension-id "$EXTENSION_ID" \
            --client-id "$CLIENT_ID" \
            --client-secret "$CLIENT_SECRET" \
            --refresh-token "$REFRESH_TOKEN"
          echo "Chrome credentials valid"

  check_firefox:
    runs-on: ubuntu-latest
    environment: firefox-store
    permissions:
      contents: read
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify Firefox AMO credentials
        env:
          WEB_EXT_API_KEY: ${{ vars.AMO_API_KEY }}
          WEB_EXT_API_SECRET: ${{ secrets.AMO_API_SECRET }}
        run: |
          echo "Testing AMO API credentials..."
          mkdir -p /tmp/amo-test
          echo '{"manifest_version": 2, "name": "credential-check", "version": "0.0.1"}' > /tmp/amo-test/manifest.json
          # sign will fail (dummy extension), but auth errors are distinct
          set +e
          OUTPUT=$(npm exec web-ext@8 -- sign \
            --source-dir /tmp/amo-test \
            --channel unlisted \
            --approval-timeout 0 2>&1)
          EXIT_CODE=$?
          set -e
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -qi "unauthorized\|JWT"; then
            echo "ERROR: AMO credentials are invalid"
            exit 1
          fi
          echo "AMO credentials valid (auth succeeded)"
